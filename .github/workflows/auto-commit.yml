name: Auto Commit

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Make commit
        run: |
          echo "update $(date)" >> activity.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "auto: daily update" || echo "nothing to commit"
          git push
